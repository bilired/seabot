# Nginx 配置文件 - yunpingtai.cc
# 位置：/home/wwwroot/yunpingtai.cc/nginx.conf
# 在宝塔面板中可直接编辑 → 网站 → yunpingtai.cc → 配置文件

# ===== HTTP 重定向到 HTTPS =====
server {
    listen 80;
    listen [::]:80;
    server_name yunpingtai.cc www.yunpingtai.cc;
    
    # 重定向所有 HTTP 到 HTTPS
    return 301 https://$server_name$request_uri;
}

# ===== HTTPS 主服务器块 =====
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name yunpingtai.cc www.yunpingtai.cc;
    
    # 宝塔面板会自动处理 SSL 证书路径，但这是标准位置
    ssl_certificate /usr/local/nginx/conf/ssl/yunpingtai.cc/fullchain.pem;
    ssl_certificate_key /usr/local/nginx/conf/ssl/yunpingtai.cc/private.key;
    
    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # 添加 HSTS header
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # 日志文件
    access_log /home/wwwroot/yunpingtai.cc/logs/nginx_access.log;
    error_log /home/wwwroot/yunpingtai.cc/logs/nginx_error.log;
    
    # 上传文件限制
    client_max_body_size 500M;
    
    # ===== 前端路由 - Vue SPA =====
    location / {
        # 前端文件目录
        root /home/wwwroot/yunpingtai.cc/art-design-pro/dist;
        
        # Vue Router 模式：所有 404 路由到 index.html
        try_files $uri $uri/ /index.html;
        
        # 缓存策略
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
    
    # ===== 后端 API 反向代理 =====
    # SSE endpoints: same path supports JSON and stream mode, so disable buffering here.
    location = /api/ship/device-locations/ {
        proxy_pass http://unix:/home/wwwroot/yunpingtai.cc/gunicorn.sock;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        chunked_transfer_encoding off;
    }

    location = /api/ship/gateway/status/ {
        proxy_pass http://unix:/home/wwwroot/yunpingtai.cc/gunicorn.sock;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        chunked_transfer_encoding off;
    }

    location /api/ {
        # Gunicorn socket 代理
        proxy_pass http://unix:/home/wwwroot/yunpingtai.cc/gunicorn.sock;
        
        # 代理头部配置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 代理超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓存禁用（API 通常不缓存）
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
    
    # ===== Django 静态文件 =====
    location /static/ {
        alias /home/wwwroot/yunpingtai.cc/static/;
        
        # 长期缓存（因为文件名通常包含哈希值）
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        
        # 防止访问受限文件
        location ~ /\.ht { deny all; }
    }
    
    # ===== 媒体文件 =====
    location /media/ {
        alias /home/wwwroot/yunpingtai.cc/media/;
        
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        
        # 视频流支持
        mp4;
    }
    
    # ===== Favicon 和 Robots.txt =====
    location = /favicon.ico {
        alias /home/wwwroot/yunpingtai.cc/art-design-pro/dist/favicon.ico;
        expires 30d;
    }
    
    location = /robots.txt {
        alias /home/wwwroot/yunpingtai.cc/robots.txt;
        expires 30d;
    }
    
    # ===== 防止访问敏感文件 =====
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ===== 健康检查端点 =====
    location /health/ {
        proxy_pass http://unix:/home/wwwroot/yunpingtai.cc/gunicorn.sock;
        access_log off;
    }
    
    # ===== 性能优化 =====
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    
    # 隐藏 Nginx 版本
    server_tokens off;
}

# ===== 宝塔面板通常自动处理的部分 =====
# 以下配置通常已被宝塔自动添加，无需修改：
# - SSL 证书路径管理
# - Let's Encrypt 自动更新
# - 日志轮转
# - Nginx 重载
